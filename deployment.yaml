apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loan-app
  template:
    metadata:
      labels:
        app: loan-app
    spec:
      containers:
      - name: loan-app
        image: thejeshrv/loan-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: loan-service
spec:
  type: NodePort
  selector:
    app: loan-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30011